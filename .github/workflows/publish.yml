name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish Extractors
        working-directory: ./extractors
        run: |
          npm install
          npm run build
          # Only publish if the version doesn't exist on NPM
          if ! npm view skystream-extractors@$(node -p "require('./package.json').version") > /dev/null 2>&1; then
            npm publish --access public
          else
            echo "Extractors version already published, skipping..."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        working-directory: ./cli
        run: |
          npm install
          npm run build
          # Only publish if the version doesn't exist on NPM
          if ! npm view skystream-cli@$(node -p "require('./package.json').version") > /dev/null 2>&1; then
            npm publish --access public
          else
            echo "CLI version already published, skipping..."
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
